name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: ${{ matrix.os }} · node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest dropped until npm optional-deps rollup bug is resolved
        # (https://github.com/npm/cli/issues/4828).
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install deps
        run: npm ci
      - name: KB layout tests
        run: npm run validate
