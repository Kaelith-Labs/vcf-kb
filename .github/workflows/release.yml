name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Validate KB (schema + port drift)
        run: npm run validate

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Prereleases (version contains a hyphen) go under `alpha` tag so
          # `npm install <pkg>` without a tag doesn't silently pick up an
          # unstable content revision once 1.0.0 ships.
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            npm publish --provenance --access public --tag alpha
          else
            npm publish --provenance --access public
          fi

  notes:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --notes "Content-only package. Tracks MCP spec 2025-11-25."
